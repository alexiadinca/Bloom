<nav class="navbar">
  <a routerLink="/products" class="logo">Bloom</a>

  <div class="nav-links">

    <a routerLink="/">Home</a>

    <a routerLink="/products">Products</a>

    <a routerLink="/cart" class="cart-link">
      Cart
      <span class="cart-badge">{{ cartCount$ | async }}</span>
    </a>

    <ng-container *ngIf="currentUser$ | async as user; else guestLinks">
      <span class="user-name">Hi, {{ user.firstName }}</span>
      <button type="button" class="logout-btn" (click)="logout()">Logout</button>
    </ng-container>

    <ng-template #guestLinks>
      <a routerLink="/login">Login</a>
      <a routerLink="/register" class="register-link">Register</a>
    </ng-template>
  </div>
</nav>
