<section class="hero">
  <p class="eyebrow">Bloom Student Kits</p>
  <h1>Student survival kits for everyday chaos.</h1>
  <p class="hero-text">
    Curated kits designed for study days, deadlines, rainy mornings and weekend resets.
  </p>
</section>

<section class="products-section">
  <div class="section-header">
    <h2>Shop the kits</h2>
    <p>Choose a kit that fits your student routine.</p>
  </div>

  <p *ngIf="isLoading" class="state-message">Loading products...</p>

  <p *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </p>

  <div *ngIf="!isLoading && !errorMessage" class="products-grid">
    <app-product-card-component
      *ngFor="let product of products"
      [product]="product"
      (addProduct)="addToCart($event)">
    </app-product-card-component>
  </div>
</section>
